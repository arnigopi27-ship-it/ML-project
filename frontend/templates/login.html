<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Smart Family Finance Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-card { max-width: 420px; margin: 60px auto; padding: 24px; border-radius: 12px; background: var(--bg-card); }
    .login-card h2 { margin-bottom: 12px; }
    .login-actions { display:flex; gap:12px; margin-top:16px }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-card">
      <h2>Login</h2>
      <p>Enter your name and email to sign in.</p>
      <form id="login-form">
        <div class="form-group">
          <label for="login-name">Name</label>
          <input id="login-name" name="name" type="text" placeholder="Your name (optional)" />
        </div>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="login-actions">
          <button class="btn btn-primary" type="submit">Sign in</button>
          <a href="/" class="btn btn-secondary">Back</a>
        </div>
      </form>
      <div id="login-msg" class="result-box hidden" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('login-name').value;
      const email = document.getElementById('login-email').value;
      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Login failed');
        // Redirect to main app
        window.location.href = '/';
      } catch (err) {
        const box = document.getElementById('login-msg');
        box.classList.remove('hidden');
        box.className = 'result-box error';
        box.textContent = err.message;
      }
    });
  </script>
</body>
</html>
